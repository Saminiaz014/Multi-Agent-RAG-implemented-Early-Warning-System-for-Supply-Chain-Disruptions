weight_mode: "hand_tuned"   # "hand_tuned" | "optimized"
# When "hand_tuned": use the manually specified weights throughout.
# When "optimized": load weights from config/optimized_weights.yaml
# (generated by Optuna via `python main.py --optimize`).

optimization:
  enabled: true
  n_trials: 100
  timeout_seconds: 3600        # 1 hour max
  sampler: "tpe"               # "tpe" (Tree-structured Parzen Estimator) | "cmaes"
  pruner: "median"             # early-stop bad trials
  direction: "maximize"
  seeds:
    train: 42
    validation: 43
    test: 44
  objective_weights:
    f1: 0.50                   # reward correct detection
    lead_time: 0.30            # reward early detection
    fpr_penalty: 0.20          # penalize false alarms
  parameter_space:
    # Which weight layers to optimize.
    inter_agent_weights: true    # Layer 2: shipping, market, geo, disaster, routing, news
    intra_agent_weights: true    # Layer 1: per-agent feature weights
    thresholds: true             # Layer 3: risk thresholds, agreement multipliers
    detection_params: false      # IF contamination, z-thresholds (optional, expensive)

ingestion:
  shipping:
    # Source for vessel-arrival signals. One of: "csv", "synthetic", "api".
    source_mode: "csv"
    csv_path: "data/raw/shuaiba_arrivals.csv"
    vessel_type_columns:
      - "Container"
      - "Dry Bulk"
      - "General Cargo"
      - "Roll-on/roll-off"
      - "Tanker"
    api:
      # Placeholders for the planned aisstream.io WebSocket integration.
      endpoint: "wss://stream.aisstream.io/v0/stream"
      key: null
      bounding_box:
        # Shuaiba port, Kuwait (Persian Gulf).
        lat_min: 28.95
        lat_max: 29.20
        lon_min: 48.05
        lon_max: 48.25
  market:
    # Source for market-data signals. One of: "csv", "synthetic", "api".
    source_mode: "csv"
    brent_crude_path: "data/raw/brent_crude.csv"
    freight_ppi_path: "data/raw/freight_ppi.csv"
    freight_services_path: "data/raw/freight_services.csv"
    api:
      # Placeholders for planned live FRED + Alpha Vantage integration.
      fred_endpoint: "https://api.stlouisfed.org/fred"
      fred_key: null
      alpha_vantage_key: null

agents:
  shipping:
    enabled: true
    detection_method: "isolation_forest"
    contamination: 0.1
    threshold: 0.65
    z_threshold: 2.0
  market:
    enabled: true
    detection_method: "zscore"
    z_threshold: 1.5
    threshold: 0.50
    baseline_years: 5
  geopolitical:
    enabled: true
    data_mode: "synthetic"  # Options: "synthetic" | "csv" | "api"
    detection_method: "weighted_composite"
    threshold: 0.5
    lead_days: 3
    weights:
      sanctions: 0.35
      military: 0.25
      diplomatic: 0.25
      stability: 0.15
    csv_path: "data/raw/geopolitical_events.csv"
    api:
      provider: "acled"
      base_url: "https://api.acleddata.com/acled/read"
      api_key: ""
      refresh_interval_hours: 24
  natural_disaster:
    enabled: true
    data_mode: "synthetic"
    detection_method: "weighted_composite"
    threshold: 0.30
    single_event_threshold: 0.40
    weights:
      earthquake: 0.35
      tsunami: 0.30
      cyclone: 0.20
      severe_weather: 0.15
    proximity:
      center_lat: 26.5
      center_lon: 56.5
      full_weight_radius_km: 500
      decay_radius_km: 1500
    csv_path: "data/raw/disaster_events.csv"
    location: "hormuz"  # key into monitoring_points below, used by fetch_api()
    api:
      usgs_url: "https://earthquake.usgs.gov/fdsnws/event/1/query"
      ambee_url: "https://api.ambeedata.com/disasters/latest/by-lat-lng"
      ambee_base_url: "https://api.ambeedata.com"
      ambee_api_key: "${AMBEE_API_KEY}"
      refresh_interval_hours: 6

    # Categorical (Ambee) -> numerical [0,1] severity mapping.
    # Ambee's /disasters endpoints return two categorical fields —
    # proximity_severity_level and default_alert_levels — with no
    # underlying magnitude/wind-speed number, so this is a deliberate
    # approximation rather than the Richter-scale severity used for the
    # synthetic/CSV paths.
    severity_mapping:
      proximity:
        "Low": 0.20
        "Moderate": 0.50
        "High Risk": 0.85
      alert:
        "Green": 0.10
        "Yellow": 0.35
        "Orange": 0.65
        "Red": 0.90
      proximity_weight: 0.6
      alert_weight: 0.4

    # Chokepoint monitoring coordinates queried against Ambee.
    monitoring_points:
      hormuz:
        - { name: "Hormuz Strait Center", lat: 26.56, lng: 56.25 }
        - { name: "Fujairah Port", lat: 25.12, lng: 56.33 }
        - { name: "Bandar Abbas", lat: 27.18, lng: 56.27 }
      red_sea:
        - { name: "Bab el-Mandeb", lat: 12.58, lng: 43.33 }
        - { name: "Jeddah Port", lat: 21.49, lng: 39.17 }
      malacca:
        - { name: "Malacca Strait Center", lat: 2.50, lng: 101.80 }
        - { name: "Singapore Strait", lat: 1.25, lng: 103.80 }
      suez:
        - { name: "Suez Canal North", lat: 31.27, lng: 32.31 }
        - { name: "Suez Canal South", lat: 29.95, lng: 32.55 }
  routing:
    enabled: true
    data_mode: "synthetic"
    detection_method: "isolation_forest"
    contamination: 0.08
    threshold: 0.55
    min_rerouting_pct: 10
    model_version: "hormuz_v1.0"
    lead_days: 2
    weights:
      model_score: 0.6
      transit_zscore: 0.4
    csv_path: "data/raw/routing_data.csv"
    api:
      provider: "kpler"
      base_url: ""
      api_key: ""
      refresh_interval_hours: 12
  news_sentiment:
    enabled: true
    data_mode: "synthetic"
    detection_method: "sentiment_threshold"
    negative_threshold: -0.30
    consensus_threshold: 0.40
    volume_spike_multiplier: 2.0
    threshold: 0.40
    weights:
      sentiment: 0.40
      consensus: 0.25
      velocity: 0.20
      volume: 0.15
    location_context:
      primary_location: "Strait of Hormuz"
      region: "Persian Gulf"
      countries: ["Iran", "Oman", "UAE", "Saudi Arabia"]
      topics: ["shipping", "oil", "tanker", "sanctions", "military", "blockade"]
    csv_path: "data/raw/news_sentiment.csv"
    api:
      news_provider: "newsapi"
      newsapi_url: "https://newsapi.org/v2/everything"
      newsapi_key: ""
      gdelt_url: "https://api.gdeltproject.org/api/v2/doc/doc"
      sentiment_model: "vader"
      embedding_model: "all-MiniLM-L6-v2"
      refresh_interval_hours: 6
      recency_weights:
        fresh_days: 2
        fresh_weight: 1.0
        recent_days: 7
        recent_weight: 0.5
        old_weight: 0.1

weights:
  shipping: 0.25
  market: 0.15
  geopolitical: 0.25
  natural_disaster: 0.10
  routing: 0.15
  news_sentiment: 0.10

thresholds:
  risk_critical: 0.8
  risk_high: 0.6
  risk_medium: 0.4
  risk_low: 0.2

rag:
  collection_name: "disruption_cases"
  top_k: 3  # Number of similar cases to retrieve for RAG (legacy ContextRetriever.query)

  # --- Composite-threshold-gated historical similarity lookup ---
  # query_gated() only fires when the composite risk score clears this bar.
  composite_threshold: 0.65     # hand_tuned default; Optuna can optimize this
  min_similarity: 0.55          # minimum cosine similarity to include a result
  embedding_model: "all-MiniLM-L6-v2"
  collections:
    static_cases: "disruption_cases"        # existing 10 historical cases
    live_context: "live_extracted_context"  # API-extracted events (new)

# --- API Keys (resolve from environment / .env; never commit real secrets here) ---
api_keys:
  fred: "${FRED_API_KEY}"
  newsapi: "${NEWSAPI_KEY}"
  acled_username: "${ACLED_USERNAME}"
  acled_password: "${ACLED_PASSWORD}"
  aisstream: "${AISSTREAM_API_KEY}"
  serpapi: "${SERPAPI_API_KEY}"

# --- Live API extraction settings (RAG knowledge base population) ---
extraction:
  enabled_extractors:
    - newsapi
    - serpapi     # date-unbounded Google News, for historical RAG backfill (NewsAPI free tier is ~30-day only)
    - ambee       # replaces reliefweb (gated by an unapproved appname); see severity_mapping note above
    - fred
    - acled
    # aisstream is live-only, not used for historical RAG population
    # reliefweb is kept available (src/extractors/reliefweb_extractor.py) as a
    # fallback once an approved ReliefWeb appname is obtained.

  historical_range:
    start_year: 2007   # Cyclone Gonu (earliest RAG case)
    end_year: 2025

  chokepoints:
    hormuz:
      countries: ["Iran", "Oman", "United Arab Emirates", "Saudi Arabia", "Qatar", "Bahrain", "Kuwait", "Iraq"]
      bounding_box: { lat_min: 25.0, lat_max: 27.5, lon_min: 55.0, lon_max: 58.0 }
    red_sea:
      countries: ["Yemen", "Saudi Arabia", "Egypt", "Eritrea", "Djibouti", "Sudan", "Somalia"]
      bounding_box: { lat_min: 12.0, lat_max: 30.0, lon_min: 32.0, lon_max: 44.0 }
    malacca:
      countries: ["Malaysia", "Indonesia", "Singapore"]
      bounding_box: { lat_min: 0.5, lat_max: 4.0, lon_min: 99.0, lon_max: 105.0 }
    suez:
      countries: ["Egypt"]
      bounding_box: { lat_min: 29.5, lat_max: 31.5, lon_min: 32.0, lon_max: 33.0 }

  rate_limits:
    newsapi: 30       # Free tier: 100/day, so ~30/min is safe
    reliefweb: 60     # No published limit, be respectful
    ambee: 60         # Be respectful, free tier
    fred: 100         # Official: 120/min
    acled: 20         # Be respectful, free research tier
    serpapi: 10       # conservative — free tier allows 50/hour; one-time backfill of ~20 queries

# --- aisstream Live Monitoring (shipping + routing agents, live only) ---
aisstream:
  enabled: false
  websocket_url: "wss://stream.aisstream.io/v0/stream"
  monitor_regions:
    - name: "hormuz"
      bbox: [[25.0, 55.0], [27.5, 58.0]]   # [[lat_min, lon_min], [lat_max, lon_max]]
  metrics:
    vessel_count_window_hours: 24
    delay_baseline_hours: 3.0
    congestion_baseline: 0.3

api:
  host: "0.0.0.0"
  port: 8000

logging:
  level: "INFO"
  file: "logs/pipeline.log"

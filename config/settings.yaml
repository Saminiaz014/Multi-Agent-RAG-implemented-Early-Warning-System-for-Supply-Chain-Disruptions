ingestion:
  shipping:
    # Source for vessel-arrival signals. One of: "csv", "synthetic", "api".
    source_mode: "csv"
    csv_path: "data/raw/shuaiba_arrivals.csv"
    vessel_type_columns:
      - "Container"
      - "Dry Bulk"
      - "General Cargo"
      - "Roll-on/roll-off"
      - "Tanker"
    api:
      # Placeholders for the planned aisstream.io WebSocket integration.
      endpoint: "wss://stream.aisstream.io/v0/stream"
      key: null
      bounding_box:
        # Shuaiba port, Kuwait (Persian Gulf).
        lat_min: 28.95
        lat_max: 29.20
        lon_min: 48.05
        lon_max: 48.25

agents:
  shipping:
    enabled: true
    detection_method: "isolation_forest"
    contamination: 0.1
    threshold: 0.65
  market:
    enabled: false
    detection_method: "zscore"
    z_threshold: 2.5

weights:
  shipping: 0.4
  market: 0.3
  geopolitical: 0.3

thresholds:
  risk_critical: 0.8
  risk_high: 0.6
  risk_medium: 0.4
  risk_low: 0.2

rag:
  collection_name: "disruption_cases"
  top_k: 3  # Number of similar cases to retrieve for RAG

api:
  host: "0.0.0.0"
  port: 8000

logging:
  level: "INFO"
  file: "logs/pipeline.log"

weight_mode: "hand_tuned"   # "hand_tuned" | "optimized"
# When "hand_tuned": use the manually specified weights throughout.
# When "optimized": load weights from config/optimized_weights.yaml
# (generated by Optuna via `python main.py --optimize`).

optimization:
  enabled: true
  n_trials: 100
  timeout_seconds: 3600        # 1 hour max
  sampler: "tpe"               # "tpe" (Tree-structured Parzen Estimator) | "cmaes"
  pruner: "median"             # early-stop bad trials
  direction: "maximize"
  seeds:
    train: 42
    validation: 43
    test: 44
  objective_weights:
    f1: 0.50                   # reward correct detection
    lead_time: 0.30            # reward early detection
    fpr_penalty: 0.20          # penalize false alarms
  parameter_space:
    # Which weight layers to optimize.
    inter_agent_weights: true    # Layer 2: shipping, market, geo, disaster, routing, news
    intra_agent_weights: true    # Layer 1: per-agent feature weights
    thresholds: true             # Layer 3: risk thresholds, agreement multipliers
    detection_params: false      # IF contamination, z-thresholds (optional, expensive)

ingestion:
  shipping:
    # Source for vessel-arrival signals. One of: "csv", "synthetic", "api".
    source_mode: "csv"
    csv_path: "data/raw/shuaiba_arrivals.csv"
    vessel_type_columns:
      - "Container"
      - "Dry Bulk"
      - "General Cargo"
      - "Roll-on/roll-off"
      - "Tanker"
    api:
      # Placeholders for the planned aisstream.io WebSocket integration.
      endpoint: "wss://stream.aisstream.io/v0/stream"
      key: null
      bounding_box:
        # Shuaiba port, Kuwait (Persian Gulf).
        lat_min: 28.95
        lat_max: 29.20
        lon_min: 48.05
        lon_max: 48.25
  market:
    # Source for market-data signals. One of: "csv", "synthetic", "api".
    source_mode: "csv"
    brent_crude_path: "data/raw/brent_crude.csv"
    freight_ppi_path: "data/raw/freight_ppi.csv"
    freight_services_path: "data/raw/freight_services.csv"
    api:
      # Placeholders for planned live FRED + Alpha Vantage integration.
      fred_endpoint: "https://api.stlouisfed.org/fred"
      fred_key: null
      alpha_vantage_key: null

agents:
  shipping:
    enabled: true
    detection_method: "isolation_forest"
    contamination: 0.1
    threshold: 0.65
    z_threshold: 2.0
  market:
    enabled: true
    detection_method: "zscore"
    z_threshold: 1.5
    threshold: 0.50
    baseline_years: 5
  geopolitical:
    enabled: true
    data_mode: "synthetic"  # Options: "synthetic" | "csv" | "api"
    detection_method: "weighted_composite"
    threshold: 0.5
    lead_days: 3
    weights:
      sanctions: 0.35
      military: 0.25
      diplomatic: 0.25
      stability: 0.15
    csv_path: "data/raw/geopolitical_events.csv"
    api:
      provider: "acled"
      base_url: "https://api.acleddata.com/acled/read"
      api_key: ""
      refresh_interval_hours: 24
  natural_disaster:
    enabled: true
    data_mode: "synthetic"
    detection_method: "weighted_composite"
    threshold: 0.30
    single_event_threshold: 0.40
    weights:
      earthquake: 0.35
      tsunami: 0.30
      cyclone: 0.20
      severe_weather: 0.15
    proximity:
      center_lat: 26.5
      center_lon: 56.5
      full_weight_radius_km: 500
      decay_radius_km: 1500
    csv_path: "data/raw/disaster_events.csv"
    api:
      usgs_url: "https://earthquake.usgs.gov/fdsnws/event/1/query"
      ambee_url: "https://api.ambeedata.com/disasters/latest/by-lat-lng"
      ambee_api_key: ""
      refresh_interval_hours: 6
  routing:
    enabled: true
    data_mode: "synthetic"
    detection_method: "isolation_forest"
    contamination: 0.08
    threshold: 0.55
    min_rerouting_pct: 10
    model_version: "hormuz_v1.0"
    lead_days: 2
    weights:
      model_score: 0.6
      transit_zscore: 0.4
    csv_path: "data/raw/routing_data.csv"
    api:
      provider: "kpler"
      base_url: ""
      api_key: ""
      refresh_interval_hours: 12
  news_sentiment:
    enabled: true
    data_mode: "synthetic"
    detection_method: "sentiment_threshold"
    negative_threshold: -0.30
    consensus_threshold: 0.40
    volume_spike_multiplier: 2.0
    threshold: 0.40
    weights:
      sentiment: 0.40
      consensus: 0.25
      velocity: 0.20
      volume: 0.15
    location_context:
      primary_location: "Strait of Hormuz"
      region: "Persian Gulf"
      countries: ["Iran", "Oman", "UAE", "Saudi Arabia"]
      topics: ["shipping", "oil", "tanker", "sanctions", "military", "blockade"]
    csv_path: "data/raw/news_sentiment.csv"
    api:
      news_provider: "newsapi"
      newsapi_url: "https://newsapi.org/v2/everything"
      newsapi_key: ""
      gdelt_url: "https://api.gdeltproject.org/api/v2/doc/doc"
      sentiment_model: "vader"
      embedding_model: "all-MiniLM-L6-v2"
      refresh_interval_hours: 6
      recency_weights:
        fresh_days: 2
        fresh_weight: 1.0
        recent_days: 7
        recent_weight: 0.5
        old_weight: 0.1

weights:
  shipping: 0.25
  market: 0.15
  geopolitical: 0.25
  natural_disaster: 0.10
  routing: 0.15
  news_sentiment: 0.10

thresholds:
  risk_critical: 0.8
  risk_high: 0.6
  risk_medium: 0.4
  risk_low: 0.2

rag:
  collection_name: "disruption_cases"
  top_k: 3  # Number of similar cases to retrieve for RAG

api:
  host: "0.0.0.0"
  port: 8000

logging:
  level: "INFO"
  file: "logs/pipeline.log"
